# Railway project config — three services plus a managed Postgres addon.
#
# Services:
#   backend  → FastAPI (uvicorn) on PORT
#   worker   → APScheduler loop. No public port.
#   frontend → Next.js standalone (Node)
#
# Deploy:
#   Set RAILWAY_TOKEN env var then run:
#     railway up --service backend
#     railway up --service worker
#     railway up --service frontend
#
# Required env vars to set in Railway dashboard (per service):
#   backend + worker: MASTER_KEY, JWT_SECRET, ADMIN_EMAIL, ADMIN_PASSWORD,
#                     OPENAI_API_KEY, ELEVENLABS_API_KEY, PEXELS_API_KEY, etc.
#   frontend: NEXT_PUBLIC_API_URL = <your Railway backend public URL>

[build]
builder = "DOCKERFILE"

# ─── backend service ──────────────────────────────────────────────────
[[services]]
name = "backend"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[services.variables]
SMA_DATABASE_URL = "${{Postgres.DATABASE_URL}}"
DEPLOYMENT_MODE = "single_tenant"

# ─── worker service ───────────────────────────────────────────────────
[[services]]
name = "worker"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "python -m sma.worker.main"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[services.variables]
SMA_DATABASE_URL = "${{Postgres.DATABASE_URL}}"
DEPLOYMENT_MODE = "single_tenant"

# ─── frontend service ─────────────────────────────────────────────────
[[services]]
name = "frontend"

[services.build]
dockerfilePath = "Dockerfile"
rootDirectory = "frontend"

[services.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
